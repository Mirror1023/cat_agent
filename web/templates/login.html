<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatGram — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#12100d;--surface:#1d1916;--border:#3d3830;--text:#ede0cb;--text-dim:#9a8870;--accent:#d4782a;--accent-light:#e8943c;--accent-glow:rgba(212,120,42,0.13);--red:#e05050;--red-bg:rgba(224,80,80,0.12);--red-border:rgba(224,80,80,0.25)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.login-wrap{width:340px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.login-avatar{
  width:80px;height:80px;border-radius:50%;
  object-fit:cover;object-position:center 20%;
  border:2.5px solid var(--accent);
  box-shadow:0 0 0 5px var(--accent-glow);
  display:block;margin:0 auto 18px;
}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-0.2px}
h1 span{color:var(--accent)}
.tagline{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:7px}
input{
  background:#272320;border:1px solid var(--border);border-radius:8px;
  padding:11px 14px;color:var(--text);font-size:15px;width:100%;
  margin-bottom:18px;outline:none;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:rgba(212,120,42,0.4);box-shadow:0 0 0 3px var(--accent-glow)}
button{
  background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;
  transition:all .15s;letter-spacing:0.1px;
  box-shadow:0 2px 10px rgba(212,120,42,0.35);
}
button:hover{background:var(--accent-light);box-shadow:0 4px 16px rgba(212,120,42,0.45);transform:translateY(-1px)}
button:active{transform:translateY(0)}
.error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);padding:11px 14px;border-radius:8px;margin-bottom:18px;font-size:13.5px;font-weight:500}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <img src="/static/mascot.jpg" alt="Mascot" class="login-avatar">
    <h1>Cat<span>Gram</span></h1>
    <p class="tagline">AI Instagram Agent</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="error">{{ msg }}</div>
    {% endfor %}{% endif %}{% endwith %}
    <form method="POST">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter admin password" autofocus required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
